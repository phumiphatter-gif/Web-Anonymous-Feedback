<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
background:linear-gradient(135deg,#1f3c88,#39a2db);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN */
.login-box{
background:white;
padding:35px;
width:360px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#1f3c88;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

.login-box button{
width:100%;
padding:12px;
background:#1f3c88;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.login-box button:hover{
background:#162d63;
}

.back{
margin-top:10px;
background:#6c757d;
}

.back:hover{
background:#555;
}

/* DASHBOARD */

.dashboard{
display:none;
width:100%;
max-width:900px;
padding:20px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
color:white;
margin-bottom:20px;
}

.logout{
background:#dc3545;
border:none;
color:white;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.stars{
color:#ffc107;
margin:5px 0;
}

.delete{
background:#dc3545;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
margin-top:8px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

<h2>เข้าสู่ระบบแอดมิน</h2>

<input type="text" id="user" placeholder="ชื่อผู้ใช้">

<input type="password" id="pass" placeholder="รหัสผ่าน">

<button onclick="login()">เข้าสู่ระบบ</button>

<button class="back" onclick="goBack()">กลับหน้าเว็บไซต์</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Admin Dashboard</h2>

<button class="logout" onclick="logout()">ออกจากระบบ</button>
</div>

<div id="feedbackList"></div>

</div>

<script>

const username="admin";
const password="1234";

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u===username && p===password){

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

loadFeedback();

}else{

alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");

}

}

function goBack(){

window.location.href="index.html";

}

function logout(){

location.reload();

}

function loadFeedback(){

let data=JSON.parse(localStorage.getItem("feedback"))||[];

let list=document.getElementById("feedbackList");

list.innerHTML="";

if(data.length===0){

list.innerHTML="<div class='card'>ยังไม่มีความคิดเห็น</div>";

return;

}

data.reverse().forEach((item,i)=>{

list.innerHTML+=`

<div class="card">

<b>หมวดหมู่:</b> ${item.category}

<div class="stars">${"★".repeat(item.rating)}</div>

<p>${item.comment}</p>

<small>${item.date}</small><br>

<button class="delete" onclick="deleteFeedback(${data.length-1-i})">ลบ</button>

</div>

`;

});

}

function deleteFeedback(i){

let data=JSON.parse(localStorage.getItem("feedback"))||[];

data.splice(i,1);

localStorage.setItem("feedback",JSON.stringify(data));

loadFeedback();

}

</script>

</body>
</html>
